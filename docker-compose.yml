version: '3.8'

services:
  # ========================
  # MySQL Database
  # ========================
  db:
    image: mysql:8.0
    container_name: cebio-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cebio_root_2024}
      MYSQL_DATABASE: ${DB_NAME:-cebio_brasil}
      MYSQL_USER: ${DB_USER:-cebio_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cebio_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/cebio_database_updated.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-cebio_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Backend Node.js API
  # ========================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cebio-backend
    restart: always
    environment:
      PORT: 8000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-cebio_user}
      DB_PASSWORD: ${DB_PASSWORD:-cebio_pass}
      DB_NAME: ${DB_NAME:-cebio_brasil}
      JWT_SECRET: ${JWT_SECRET:-4c8cb482b2ceeb7ebe08079ad46e6bee76112d78db2056562c8aa0617613b408}
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ========================
  # Frontend Nginx
  # ========================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: cebio-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
